<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rich Text Editor</title>
    <meta name="description" content="A simple and clean rich text editor component for Lomiri desktop applications.">
    <meta property="og:title" content="Rich Text Editor">
    <meta property="og:description" content="A simple and clean rich text editor component for Lomiri desktop applications.">
    <script>
        // Apply dark mode to <html> IMMEDIATELY before first paint to prevent white flash
        (function () {
            var search = window.location.search.substring(1);
            if (search.indexOf('darkMode=true') !== -1) {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
    <style>
        /* CSS Variables for theming - matching Odoo style */
        :root {
            --bg-color: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
            --focus-color: #714B67;
            --placeholder-color: #6c757d;
            --selection-bg: rgba(113, 75, 103, 0.2);
        }

        /* Dark mode variables */
        .dark-mode {
            --bg-color: #2d2d2d;
            --text-color: #f8f9fa;
            --border-color: #495057;
            --focus-color: #ce9be7;
            --placeholder-color: #adb5bd;
            --selection-bg: rgba(206, 155, 231, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
        }

        body {
            min-height: 100%;
            width: 100%;
            margin: 0;
            padding: 8px 12px;
            overflow-y: auto;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Ubuntu", "Helvetica Neue", Arial, sans-serif;
            font-size: 13px;
            line-height: 1.5;
            background-color: var(--bg-color);
            color: var(--text-color);
            outline: none;
            word-wrap: break-word;
            white-space: normal;
        }

        /* Ensure DIV elements (Squire's default block) don't have extra spacing */
        body>div:first-child {
            margin-top: 0;
            padding-top: 0;
        }

        body>div,
        body>p {
            margin: 0 0 0.5em 0;
        }

        body>div:last-child,
        body>p:last-child {
            margin-bottom: 0;
        }

        body:empty:before {
            content: attr(data-placeholder);
            color: var(--placeholder-color);
            pointer-events: none;
        }

        body:focus {
            outline: none;
        }

        /* When editable, add bottom padding so content can scroll
           above the on-screen keyboard on mobile devices */
        body[contenteditable="true"] {
            padding-bottom: 45vh;
        }

        /* Selection styling */
        ::selection {
            background: var(--selection-bg);
        }

        /* Link styling */
        a {
            color: var(--focus-color);
            text-decoration: underline;
        }

        a:hover {
            text-decoration: none;
        }

        /* List styling */
        ul,
        ol {
            margin-left: 20px;
            padding-left: 10px;
        }

        li {
            margin-bottom: 4px;
        }

        /* Blockquote styling */
        blockquote {
            border-left: 4px solid var(--focus-color);
            margin: 8px 0;
            padding-left: 16px;
            color: var(--placeholder-color);
            font-style: italic;
        }

        /* Code block styling */
        pre {
            background: #f4f4f4;
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            font-family: "Ubuntu Mono", "Consolas", monospace;
        }

        .dark-mode pre {
            background: #1e1e1e;
        }

        /* Custom scrollbar */
        body::-webkit-scrollbar {
            width: 8px;
        }

        body::-webkit-scrollbar-track {
            background: transparent;
        }

        body::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        body::-webkit-scrollbar-thumb:hover {
            background: var(--placeholder-color);
        }
    </style>
</head>

<body contenteditable="true" data-placeholder="Write something...">
    <!-- Load the QtWebEngine bridge first -->
    <script src="squire-qtwebengine-bridge.js"></script>

    <!-- Load Squire.js - this initializes window.editor on document.body and registers all handlers -->
    <script src="squire-raw.js"></script>

    <script>
        (function () {
            'use strict';

            // Parse URL parameters for configuration
            function getUrlParams() {
                var params = {};
                var search = window.location.search.substring(1);
                if (search) {
                    var pairs = search.split('&');
                    for (var i = 0; i < pairs.length; i++) {
                        var pair = pairs[i].split('=');
                        params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1] || '');
                    }
                }
                return params;
            }

            var params = getUrlParams();

            // Apply dark mode if specified
            if (params.darkMode === 'true') {
                document.documentElement.classList.add('dark-mode');
                document.body.classList.add('dark-mode');
            }

            // Apply placeholder if specified
            if (params.placeholder) {
                document.body.setAttribute('data-placeholder', params.placeholder);
            }

            // Set initial readonly state
            if (params.readonly === 'true') {
                document.body.contentEditable = false;
            }

            // Wait for editor to be available (initialized by squire-raw.js)
            function setupEditorEvents() {
                if (typeof window.editor === 'undefined') {
                    console.log('[Editor] Waiting for Squire editor...');
                    setTimeout(setupEditorEvents, 50);
                    return;
                }

                console.log('[Editor] Squire editor found, setting up events');

                // Keyboard height in CSS pixels, set from QML via
                // window.setKeyboardHeight(). Used by scrollCursorIntoView
                // to avoid scrolling behind the on-screen keyboard.
                window._kbHeight = 0;

                /**
                 * Called from QML to inform JS about the on-screen keyboard
                 * height in CSS pixels (already divided by zoomFactor).
                 */
                window.setKeyboardHeight = function (h) {
                    window._kbHeight = h || 0;
                    console.log('[Editor] Keyboard height set to', window._kbHeight, 'CSS px');
                    scrollCursorIntoView();
                };

                // Scroll the cursor into the visible area.
                // Exposed globally so QML can call it via runJavaScript
                // when the on-screen keyboard appears or resizes.
                window.scrollCursorIntoView = function () {
                    try {
                        var selection = window.getSelection();
                        if (!selection || selection.rangeCount === 0) return;

                        var range = selection.getRangeAt(0);
                        var rect = range.getBoundingClientRect();

                        // Collapsed cursor may report zero-size rect; fall back
                        // to the parent element's bounding box.
                        if (!rect || (rect.height === 0 && rect.width === 0)) {
                            var node = range.startContainer;
                            if (node.nodeType === 3) node = node.parentElement;
                            if (node && node.getBoundingClientRect) {
                                rect = node.getBoundingClientRect();
                            }
                        }
                        if (!rect) return;

                        // Visible height = viewport minus keyboard.
                        // _kbHeight is set from QML; falls back to 0.
                        var visibleHeight = window.innerHeight - (window._kbHeight || 0);
                        var margin = 40;

                        if (rect.bottom > visibleHeight - margin) {
                            document.body.scrollTop += (rect.bottom - visibleHeight + margin);
                        } else if (rect.top < margin) {
                            document.body.scrollTop += (rect.top - margin);
                        }
                    } catch (e) {
                        // Best-effort; don't break editor on failure
                    }
                };
                var scrollCursorIntoView = window.scrollCursorIntoView;

                // Track content changes
                var lastContent = '';

                window.editor.addEventListener('input', function () {
                    var content = window.editor.getHTML();
                    if (content !== lastContent) {
                        lastContent = content;
                        oxide.sendMessage('contentChanged', { content: content });
                    }
                    // Keep cursor visible while typing (especially when
                    // the on-screen keyboard is covering part of the view)
                    scrollCursorIntoView();
                });

                // Also scroll cursor into view on Enter / new-line
                document.body.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' || e.keyCode === 13) {
                        setTimeout(scrollCursorIntoView, 50);
                    }
                });

                // Listen for window resize (e.g. QML resizing the WebEngineView
                // when the on-screen keyboard appears)
                window.addEventListener('resize', function () {
                    setTimeout(scrollCursorIntoView, 150);
                });

                // Dynamic font size tracking (Hover & Selection)
                var activeSelectionFontSize = "12pt";
                var lastHoveredFontSize = null;
                var hoverTimer = null;

                function formatPxToPt(sizeStr) {
                    if (!sizeStr) return "12pt";
                    if (sizeStr.endsWith("pt")) return sizeStr;
                    if (sizeStr.endsWith("px")) {
                        var px = parseFloat(sizeStr);
                        if (!isNaN(px)) {
                            var pt = Math.round(px * 0.75);
                            return pt + "pt";
                        }
                    }
                    return sizeStr;
                }

                function getComputedFontSizeOfNode(node) {
                    if (!node) return null;
                    if (node.nodeType === 3) node = node.parentElement;
                    if (node && node.nodeType === 1) {
                        var comp = window.getComputedStyle(node);
                        if (comp && comp.fontSize) {
                            return formatPxToPt(comp.fontSize);
                        }
                    }
                    return null;
                }

                function updateSelectionFontSize() {
                    try {
                        var sel = window.getSelection();
                        if (sel && sel.rangeCount > 0) {
                            var node = sel.getRangeAt(0).startContainer;
                            var size = getComputedFontSizeOfNode(node);
                            if (size) {
                                activeSelectionFontSize = size;
                                lastHoveredFontSize = null;
                                oxide.sendMessage('fontSizeChanged', { fontSize: size });
                            }
                        }
                    } catch(e) {}
                }

                // Reset hover state when clicking or typing
                document.body.addEventListener('mousedown', function () {
                    if (hoverTimer) clearTimeout(hoverTimer);
                    lastHoveredFontSize = null;
                    setTimeout(updateSelectionFontSize, 10);
                });

                document.body.addEventListener('keydown', function () {
                    if (hoverTimer) clearTimeout(hoverTimer);
                    lastHoveredFontSize = null;
                    setTimeout(updateSelectionFontSize, 10);
                });

                // Mouse hover font size tracking (Debounced)
                document.body.addEventListener('mousemove', function (e) {
                    var target = e.target;
                    if (hoverTimer) clearTimeout(hoverTimer);
                    hoverTimer = setTimeout(function () {
                        var size = getComputedFontSizeOfNode(target);
                        if (size && size !== lastHoveredFontSize) {
                            lastHoveredFontSize = size;
                            oxide.sendMessage('fontSizeChanged', { fontSize: size });
                        }
                    }, 80);
                });

                document.body.addEventListener('mouseleave', function () {
                    if (hoverTimer) clearTimeout(hoverTimer);
                    if (lastHoveredFontSize !== null) {
                        lastHoveredFontSize = null;
                        if (activeSelectionFontSize) {
                            oxide.sendMessage('fontSizeChanged', { fontSize: activeSelectionFontSize });
                        }
                    }
                });

                // Selection & Cursor tracking for font size
                document.addEventListener('selectionchange', updateSelectionFontSize);
                document.body.addEventListener('keyup', updateSelectionFontSize);
                document.body.addEventListener('mouseup', updateSelectionFontSize);

                // Track path changes (formatting state)
                window.editor.addEventListener('pathChange', function (e) {
                    oxide.sendMessage('pathChanged', { path: e.path || '' });
                    updateSelectionFontSize();
                });

                // Track selection changes
                window.editor.addEventListener('select', function () {
                    var selection = window.getSelection();
                    if (selection && selection.toString()) {
                        oxide.sendMessage('textSelected', { text: selection.toString() });
                    }
                });

                // Track cursor position
                window.editor.addEventListener('cursor', function () {
                    try {
                        var selection = window.getSelection();
                        if (selection.rangeCount > 0) {
                            var range = selection.getRangeAt(0);
                            var rect = range.getBoundingClientRect();
                            oxide.sendMessage('cursorPositionChanged', {
                                x: rect.left,
                                y: rect.top,
                                width: rect.width,
                                height: rect.height
                            });
                        }
                    } catch (e) {
                        console.warn('[Editor] Could not get cursor position:', e);
                    }
                });

                // Track undo state
                window.editor.addEventListener('undoStateChange', function (e) {
                    oxide.sendMessage('undoStateChanged', {
                        canUndo: e.canUndo,
                        canRedo: e.canRedo
                    });
                });

                // Register additional handlers not in squire-raw.js
                oxide.addMessageHandler('setReadOnly', function (msg) {
                    var readOnly = msg.payload.readOnly !== undefined ? msg.payload.readOnly : msg.payload;
                    document.body.contentEditable = !readOnly;
                });

                oxide.addMessageHandler('moveCursorToStart', function (msg) {
                    window.editor.moveCursorToStart();
                });

                oxide.addMessageHandler('moveCursorToEnd', function (msg) {
                    window.editor.moveCursorToEnd();
                });

                // Notify QML that editor is ready
                oxide.sendMessage('editorReady', {});

                console.log('[Editor] Squire editor setup complete');
            }

            // Start setup
            setupEditorEvents();
        })();
    </script>
</body>

</html>
